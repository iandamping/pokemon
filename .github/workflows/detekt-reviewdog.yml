name: Detekt Reviewer

on:
  pull_request:
    branches:
      - main
      - master
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:
  detekt-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Cache Gradle untuk mempercepat build selanjutnya
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Detekt via Gradle
        # Kita gunakan --continue agar jika ada error di satu modul,
        # modul lain tetap dicek dan laporannya lengkap.
        run: ./gradlew detekt --continue

      - name: Setup Reviewdog
        # Action ini tetap dijalankan baik Detekt sukses maupun gagal
        if: always()
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Post Detekt Results to PR
        # Bagian ini hanya dijalankan jika Detekt menemukan error (failure)
        if: failure()
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Cari semua file detekt.xml (karena project kamu mungkin multi-module)
          # 2. Gabungkan isi file XML tersebut
          # 3. Kirim ke reviewdog dengan format checkstyle
          find . -type f -name "detekt.xml" | xargs cat | reviewdog -f=checkstyle -reporter=github-pr-review -level=warning -diff="git diff FETCH_HEAD"